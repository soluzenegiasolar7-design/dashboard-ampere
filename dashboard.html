<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ampere Soluções — Dashboard 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d0d1a; color: #e0e0e0; padding: 24px; min-height: 100vh; }

    h1 { text-align: center; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 28px; }
    .section-title { font-size: 12px; font-weight: 700; color: #e94560; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; border-left: 3px solid #e94560; padding-left: 10px; }

    /* EDITOR */
    .editor-box {
      background: #111122;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 32px;
    }
    .editor-grid {
      display: grid;
      grid-template-columns: 80px repeat(12, 1fr);
      gap: 6px;
      font-size: 12px;
    }
    .editor-grid .header {
      background: #0f3460;
      color: #e0e0e0;
      text-align: center;
      padding: 6px 4px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 11px;
    }
    .editor-grid .row-label {
      background: #0f3460;
      color: #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 11px;
    }
    .editor-grid input {
      background: #0d0d1a;
      border: 1px solid #1e1e3a;
      border-radius: 4px;
      color: #4ade80;
      font-size: 11px;
      padding: 5px 4px;
      text-align: center;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .editor-grid input:focus { border-color: #4ade80; }
    .editor-grid input.empty { color: #333366; }
    .editor-grid input[disabled] { color: #555; cursor: not-allowed; }

    .btn-update {
      margin-top: 14px;
      background: #e94560;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-update:hover { background: #c73652; }

    .meta-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .meta-field label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; }
    .meta-field input {
      background: #0d0d1a;
      border: 1px solid #1e1e3a;
      border-radius: 6px;
      color: #fbbf24;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 10px;
      width: 160px;
      outline: none;
    }
    .meta-field input:focus { border-color: #fbbf24; }

    /* Unidades */
    .unidades-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }
    .unidade-card {
      background: #111122;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .unidade-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }
    .unidade-title {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
    }
    .unidade-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .unidade-row label { color: #666; }
    .unidade-row input {
      background: #0d0d1a;
      border: 1px solid #1e1e3a;
      border-radius: 6px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      padding: 5px 10px;
      width: 100px;
      text-align: center;
      outline: none;
    }
    .unidade-row input:focus { border-color: var(--accent); }
    .unidade-stat { font-size: 11px; color: #555; margin-top: 4px; }

    /* KPIs */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .kpi-card { background: #111122; border: 1px solid #1e1e3a; border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent, #4ade80); }
    .kpi-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .kpi-value { font-size: 24px; font-weight: 700; color: var(--accent, #4ade80); margin-bottom: 6px; }
    .kpi-sub { font-size: 12px; color: #555; }
    .kpi-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 6px; background: rgba(248,113,113,0.15); color: #f87171; }
    .kpi-badge.ok { background: rgba(74,222,128,0.15); color: #4ade80; }

    /* Progress */
    .progress-section { background: #111122; border: 1px solid #1e1e3a; border-radius: 12px; padding: 24px; margin-bottom: 32px; }
    .progress-row { margin-bottom: 20px; }
    .progress-row:last-child { margin-bottom: 0; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .progress-name { color: #aaa; }
    .progress-bar-bg { background: #1e1e3a; border-radius: 6px; height: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 6px; }
    .progress-info { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #555; }
    .pace-alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 20px; text-align: center; }
    .pace-alert.below { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
    .pace-alert.above { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; }

    /* Tabelas */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } .editor-grid { grid-template-columns: 70px repeat(6, 1fr); } }
    .card { background: #111122; border: 1px solid #1e1e3a; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #0f3460; color: #e0e0e0; padding: 9px 10px; text-align: center; font-size: 10px; font-weight: 700; }
    thead th:first-child { text-align: left; }
    tbody tr:nth-child(even) { background: #0d0d1a; }
    tbody tr:nth-child(odd) { background: #111122; }
    tbody td { padding: 8px 10px; text-align: center; color: #aaa; }
    tbody td:first-child { text-align: left; font-weight: 600; color: #e0e0e0; }
    .v26 { color: #4ade80!important; font-weight: 600; }
    .vpos { color: #4ade80!important; font-weight: 700; }
    .vneg { color: #f87171!important; font-weight: 700; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
    .bg { background: rgba(74,222,128,0.15); color: #4ade80; }
    .by { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .br { background: rgba(248,113,113,0.15); color: #f87171; }
    .bn { background: rgba(100,100,150,0.15); color: #6666aa; }
    tfoot td { background: #0f3460; padding: 9px 10px; font-weight: 700; text-align: center; color: #fff; }
    tfoot td:first-child { text-align: left; color: #e94560; }
    .section { margin-bottom: 32px; }
  </style>
</head>
<body>

<h1>⚡ AMPERE SOLUÇÕES</h1>
<p class="subtitle" id="subtitleDate"></p>

<!-- EDITOR -->
<div class="section">
  <div class="section-title">Editar Dados</div>
  <div class="editor-box">
    <div class="meta-row">
      <div class="meta-field">
        <label>Meta de Faturamento 2026</label>
        <input type="text" id="metaFat" value="8000000">
      </div>
      <div class="meta-field">
        <label>Meta de Contratos 2026</label>
        <input type="text" id="metaCon" value="480">
      </div>
    </div>

    <div class="editor-grid">
      <div class="header"></div>
      <div class="header">Jan</div><div class="header">Fev</div><div class="header">Mar</div>
      <div class="header">Abr</div><div class="header">Mai</div><div class="header">Jun</div>
      <div class="header">Jul</div><div class="header">Ago</div><div class="header">Set</div>
      <div class="header">Out</div><div class="header">Nov</div><div class="header">Dez</div>

      <div class="row-label">Fat 2026</div>
      <input type="text" id="f26_0" value="318822.53">
      <input type="text" id="f26_1" value="174517.31">
      <input type="text" id="f26_2" value="425715.11">
      <input type="text" id="f26_3" value="160189.93">
      <input type="text" id="f26_4" value="727639.39">
      <input type="text" id="f26_5" placeholder="Jun" class="empty">
      <input type="text" id="f26_6" placeholder="Jul" class="empty">
      <input type="text" id="f26_7" placeholder="Ago" class="empty">
      <input type="text" id="f26_8" placeholder="Set" class="empty">
      <input type="text" id="f26_9" placeholder="Out" class="empty">
      <input type="text" id="f26_10" placeholder="Nov" class="empty">
      <input type="text" id="f26_11" placeholder="Dez" class="empty">

      <div class="row-label">Ctrs 2026</div>
      <input type="text" id="c26_0" value="19">
      <input type="text" id="c26_1" value="9">
      <input type="text" id="c26_2" value="27">
      <input type="text" id="c26_3" value="10">
      <input type="text" id="c26_4" value="40">
      <input type="text" id="c26_5" placeholder="Jun" class="empty">
      <input type="text" id="c26_6" placeholder="Jul" class="empty">
      <input type="text" id="c26_7" placeholder="Ago" class="empty">
      <input type="text" id="c26_8" placeholder="Set" class="empty">
      <input type="text" id="c26_9" placeholder="Out" class="empty">
      <input type="text" id="c26_10" placeholder="Nov" class="empty">
      <input type="text" id="c26_11" placeholder="Dez" class="empty">
    </div>

    <button class="btn-update" onclick="atualizar()">Atualizar Dashboard</button>
  </div>
</div>

<!-- Unidades -->
<div class="section">
  <div class="section-title">Unidades</div>
  <div class="unidades-grid">
    <div class="unidade-card" style="--accent:#4ade80">
      <div class="unidade-title">📍 Ampere Natal</div>
      <div class="unidade-row"><label>Vendedores ativos</label><input type="number" id="venNatal" value="6" min="1" onchange="atualizar()"></div>
      <div class="unidade-row"><label>% da meta</label><input type="text" id="pctNatal" value="67" onchange="atualizar()"><span style="color:#555;font-size:11px">%</span></div>
      <div id="statsNatal" class="unidade-stat"></div>
    </div>
    <div class="unidade-card" style="--accent:#60a5fa">
      <div class="unidade-title">📍 Ampere Caruaru</div>
      <div class="unidade-row"><label>Vendedores ativos</label><input type="number" id="venCaruaru" value="3" min="1" onchange="atualizar()"></div>
      <div class="unidade-row"><label>% da meta</label><input type="text" id="pctCaruaru" value="33" onchange="atualizar()"><span style="color:#555;font-size:11px">%</span></div>
      <div id="statsCaruaru" class="unidade-stat"></div>
    </div>
  </div>
</div>

<!-- KPIs -->
<div class="section">
  <div class="section-title">Resumo 2026</div>
  <div class="kpi-grid" id="kpiGrid"></div>
</div>

<!-- Progresso -->
<div class="section">
  <div class="section-title">Progresso da Meta Anual</div>
  <div class="progress-section" id="progressSection"></div>
</div>

<!-- Metas Sugeridas -->
<div class="section">
  <div class="section-title">Sugestão de Metas — Meses Restantes</div>
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:32px;">
    <table id="metasTable"></table>
  </div>
</div>

<!-- Tabelas -->
<div class="two-col">
  <div>
    <div class="section-title">Comparativo Mensal 2025 vs 2026</div>
    <div class="card"><table id="compTable"></table></div>
  </div>
  <div>
    <div class="section-title">Ticket Médio por Mês</div>
    <div class="card"><table id="ticketTable"></table></div>
  </div>
</div>

<script>
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dados2025 = [
    [176704.25,10],[331974.99,11],[253845.07,16],[196808.13,11],
    [665220.92,26],[749316.36,36],[340982.96,16],[642966.93,36],
    [444576.94,20],[1249653.08,69],[429811.39,32],[348250.79,21]
  ];

  const brl = v => 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  const num = s => {
    const str = String(s).trim();
    if (str.includes(',')) return parseFloat(str.replace(/\./g,'').replace(',','.')) || 0;
    return parseFloat(str) || 0;
  };

  function getDados2026() {
    return Array.from({length:12}, (_,i) => {
      const f = num(document.getElementById('f26_'+i).value);
      const c = num(document.getElementById('c26_'+i).value);
      return (f > 0 && c > 0) ? [f, c] : null;
    });
  }

  function atualizar() {
    const dados2026 = getDados2026();
    const META_FAT = num(document.getElementById('metaFat').value);
    const META_CON = num(document.getElementById('metaCon').value);

    let acumFat = 0, acumCon = 0, mesesReal = 0;
    dados2026.forEach(d => { if (d) { acumFat += d[0]; acumCon += d[1]; mesesReal++; } });

    const mesesRest = 12 - mesesReal;
    const pctFat = (acumFat / META_FAT) * 100;
    const pctCon = (acumCon / META_CON) * 100;
    const pctAno = (mesesReal / 12) * 100;
    const projecao = mesesReal > 0 ? (acumFat / mesesReal) * 12 : 0;
    const ritmoFat = mesesRest > 0 ? (META_FAT - acumFat) / mesesRest : 0;
    const ritmoCon = mesesRest > 0 ? Math.ceil((META_CON - acumCon) / mesesRest) : 0;
    const ticket = acumCon > 0 ? acumFat / acumCon : 0;

    document.getElementById('subtitleDate').textContent =
      'Atualizado em ' + new Date().toLocaleDateString('pt-BR') + ' · Meta anual: ' + brl(META_FAT);

    // KPIs
    const corFat = pctFat >= pctAno ? '#4ade80' : '#f87171';
    const corCon = pctCon >= pctAno ? '#4ade80' : '#f87171';
    const kpis = [
      { label:'Faturamento Acumulado', value:brl(acumFat), sub:'de '+brl(META_FAT), pct:pctFat, accent:corFat },
      { label:'Contratos Fechados', value:acumCon, sub:'de '+META_CON+' contratos', pct:pctCon, accent:corCon },
      { label:'Projeção de Fechamento', value:brl(projecao), sub:'no ritmo atual', pct:(projecao/META_FAT)*100, accent:projecao>=META_FAT?'#4ade80':'#f87171' },
      { label:'Ritmo Necessário/Mês', value:brl(ritmoFat), sub:ritmoCon+' contratos/mês', pct:null, accent:'#60a5fa' },
      { label:'Ticket Médio 2026', value:brl(ticket), sub:'por contrato', pct:null, accent:'#a78bfa' },
      { label:'Meses Realizados', value:mesesReal+' / 12', sub:pctAno.toFixed(0)+'% do ano', pct:pctAno, accent:'#fbbf24' },
    ];
    document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
      <div class="kpi-card" style="--accent:${k.accent}">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value">${k.value}</div>
        <div class="kpi-sub">${k.sub}</div>
        ${k.pct!==null ? `<span class="kpi-badge ${k.pct>=pctAno?'ok':''}">${k.pct.toFixed(1)}% atingido</span>` : ''}
      </div>`).join('');

    // Progress
    const barColor = pctFat >= pctAno ? '#4ade80' : '#f87171';
    document.getElementById('progressSection').innerHTML = `
      <div class="progress-row">
        <div class="progress-header">
          <span class="progress-name">Faturamento</span>
          <span style="font-weight:700;color:${barColor}">${pctFat.toFixed(1)}%</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.min(pctFat,100)}%;background:${barColor}"></div></div>
        <div class="progress-info"><span>${brl(acumFat)} realizados</span><span>Meta: ${brl(META_FAT)}</span></div>
      </div>
      <div class="progress-row">
        <div class="progress-header">
          <span class="progress-name">Contratos</span>
          <span style="font-weight:700;color:${corCon}">${pctCon.toFixed(1)}%</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.min(pctCon,100)}%;background:${corCon}"></div></div>
        <div class="progress-info"><span>${acumCon} contratos</span><span>Meta: ${META_CON}</span></div>
      </div>
      <div class="progress-row">
        <div class="progress-header">
          <span class="progress-name">Ritmo do ano (${pctAno.toFixed(0)}% do ano já passou)</span>
          <span style="color:#555">${pctAno.toFixed(1)}%</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pctAno}%;background:#333366"></div></div>
      </div>
      <div class="pace-alert ${pctFat>=pctAno?'above':'below'}">
        ${pctFat>=pctAno
          ? '✓ Faturamento '+(pctFat-pctAno).toFixed(1)+'% acima do ritmo — no caminho certo!'
          : '⚠ Faturamento '+(pctAno-pctFat).toFixed(1)+'% abaixo do ritmo — '+pctAno.toFixed(0)+'% do ano já passou'}
      </div>`;

    // Comparativo
    let compHtml = `<thead><tr><th>Mês</th><th>2025</th><th>Ctrs</th><th>2026</th><th>Ctrs</th><th>Var.</th><th>Status</th></tr></thead><tbody>`;
    let t25=0,t26=0,tc25=0,tc26=0;
    meses.forEach((mes,i) => {
      const f25=dados2025[i][0], c25=dados2025[i][1];
      const d26=dados2026[i];
      t25+=f25; tc25+=c25;
      if (d26) {
        const v=((d26[0]-f25)/f25)*100;
        t26+=d26[0]; tc26+=d26[1];
        const cls=v>=10?'bg':v>=-10?'by':'br';
        const lbl=v>=10?'ÓTIMO':v>=-10?'OK':'BAIXO';
        compHtml+=`<tr><td>${mes}</td><td>${brl(f25)}</td><td>${c25}</td><td class="v26">${brl(d26[0])}</td><td class="v26">${d26[1]}</td><td class="${v>=0?'vpos':'vneg'}">${v>=0?'+':''}${v.toFixed(1)}%</td><td><span class="badge ${cls}">${lbl}</span></td></tr>`;
      } else {
        compHtml+=`<tr><td>${mes}</td><td>${brl(f25)}</td><td>${c25}</td><td style="color:#333">—</td><td style="color:#333">—</td><td style="color:#333">—</td><td><span class="badge bn">PEND.</span></td></tr>`;
      }
    });
    const vt=t26>0?((t26-(t25/12*mesesReal))/(t25/12*mesesReal))*100:0;
    compHtml+=`</tbody><tfoot><tr><td>TOTAL</td><td>${brl(t25)}</td><td>${tc25}</td><td class="v26">${brl(t26)}</td><td class="v26">${tc26}</td><td class="${vt>=0?'vpos':'vneg'}">${vt>=0?'+':''}${vt.toFixed(1)}%</td><td></td></tr></tfoot>`;
    document.getElementById('compTable').innerHTML = compHtml;

    // Unidades
    const venNatal = parseInt(document.getElementById('venNatal').value) || 6;
    const venCaruaru = parseInt(document.getElementById('venCaruaru').value) || 3;
    const pctNatal = num(document.getElementById('pctNatal').value) / 100;
    const pctCaruaru = num(document.getElementById('pctCaruaru').value) / 100;

    const metaNatalFat = META_FAT * pctNatal;
    const metaCaruaruFat = META_FAT * pctCaruaru;
    const metaNatalCon = Math.round(META_CON * pctNatal);
    const metaCaruaruCon = Math.round(META_CON * pctCaruaru);

    const tickPorVendNatal = metaNatalFat / venNatal / 12;
    const tickPorVendCaruaru = metaCaruaruFat / venCaruaru / 12;
    const conPorVendNatal = Math.ceil(metaNatalCon / venNatal / 12);
    const conPorVendCaruaru = Math.ceil(metaCaruaruCon / venCaruaru / 12);

    document.getElementById('statsNatal').innerHTML =
      'Meta anual: <b style="color:#4ade80">' + brl(metaNatalFat) + '</b> · ' + metaNatalCon + ' contratos<br>' +
      'Por vendedor/mês: <b style="color:#4ade80">' + brl(tickPorVendNatal) + '</b> · ' + conPorVendNatal + ' contratos';
    document.getElementById('statsCaruaru').innerHTML =
      'Meta anual: <b style="color:#60a5fa">' + brl(metaCaruaruFat) + '</b> · ' + metaCaruaruCon + ' contratos<br>' +
      'Por vendedor/mês: <b style="color:#60a5fa">' + brl(tickPorVendCaruaru) + '</b> · ' + conPorVendCaruaru + ' contratos';

    // Metas Sugeridas
    const restFat = META_FAT - acumFat;
    const restCon = META_CON - acumCon;

    // Pesos de sazonalidade de Jun-Dez baseados em 2025
    const pesosFat25 = [749316.36, 340982.96, 642966.93, 444576.94, 1249653.08, 429811.39, 348250.79];
    const totalPesoFat = pesosFat25.reduce((a,b) => a+b, 0);
    const pesosCon25 = [36, 16, 36, 20, 69, 32, 21];
    const totalPesoCon = pesosCon25.reduce((a,b) => a+b, 0);

    const mesesPend = ['Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const idxPend = [5,6,7,8,9,10,11];

    let metasHtml = `<thead><tr>
      <th style="text-align:left">Mês</th>
      <th>Meta Total</th>
      <th>Ctrs</th>
      <th style="color:#4ade80">Natal (${venNatal} vend.)</th>
      <th style="color:#60a5fa">Caruaru (${venCaruaru} vend.)</th>
      <th>Base 2025</th>
      <th>Cresc.</th>
    </tr></thead><tbody>`;

    let totalMetaFat = 0, totalMetaCon = 0;
    mesesPend.forEach((mes, i) => {
      const idx = idxPend[i];
      const d26 = dados2026[idx];
      if (!d26) {
        const mFat = (pesosFat25[i] / totalPesoFat) * restFat;
        const mCon = Math.round((pesosCon25[i] / totalPesoCon) * restCon);
        const base25 = dados2025[idx][0];
        const cresc = ((mFat - base25) / base25) * 100;
        totalMetaFat += mFat;
        totalMetaCon += mCon;
        const corCresc = cresc >= 0 ? '#4ade80' : '#f87171';
        const natalFat = brl(mFat * pctNatal);
        const caruaruFat = brl(mFat * pctCaruaru);
        const natalPV = brl(mFat * pctNatal / venNatal);
        const caruaruPV = brl(mFat * pctCaruaru / venCaruaru);
        metasHtml += `<tr>
          <td style="text-align:left;font-weight:700;color:#e0e0e0">${mes}</td>
          <td style="color:#fbbf24;font-weight:700">${brl(mFat)}</td>
          <td style="color:#fbbf24;font-weight:700">${mCon}</td>
          <td style="color:#4ade80">${natalFat}<br><span style="font-size:10px;color:#2d6a4f">${natalPV}/vend.</span></td>
          <td style="color:#60a5fa">${caruaruFat}<br><span style="font-size:10px;color:#1e3a5f">${caruaruPV}/vend.</span></td>
          <td style="color:#666">${brl(base25)}</td>
          <td style="color:${corCresc};font-weight:700">${cresc>=0?'+':''}${cresc.toFixed(1)}%</td>
        </tr>`;
      } else {
        metasHtml += `<tr>
          <td style="text-align:left;font-weight:700;color:#e0e0e0">${mes}</td>
          <td class="v26">${brl(d26[0])}<br><span style="font-size:10px;color:#555">realizado</span></td>
          <td class="v26">${d26[1]}</td>
          <td style="color:#333">—</td>
          <td style="color:#333">—</td>
          <td style="color:#666">${brl(dados2025[idx][0])}</td>
          <td style="color:#555">—</td>
        </tr>`;
      }
    });

    metasHtml += `</tbody><tfoot><tr>
      <td style="text-align:left">TOTAL RESTANTE</td>
      <td style="color:#fbbf24">${brl(totalMetaFat)}</td>
      <td style="color:#fbbf24">${totalMetaCon}</td>
      <td style="color:#4ade80">${brl(totalMetaFat * pctNatal)}</td>
      <td style="color:#60a5fa">${brl(totalMetaFat * pctCaruaru)}</td>
      <td></td><td></td>
    </tr></tfoot>`;
    document.getElementById('metasTable').innerHTML = metasHtml;

    // Ticket
    let tickHtml = `<thead><tr><th>Mês</th><th>Ticket 2025</th><th>Ticket 2026</th><th>Var.</th></tr></thead><tbody>`;
    meses.forEach((mes,i) => {
      const t25=dados2025[i][0]/dados2025[i][1];
      const d26=dados2026[i];
      if (d26) {
        const t26=d26[0]/d26[1];
        const v=((t26-t25)/t25)*100;
        tickHtml+=`<tr><td>${mes}</td><td>${brl(t25)}</td><td class="v26">${brl(t26)}</td><td class="${v>=0?'vpos':'vneg'}">${v>=0?'+':''}${v.toFixed(1)}%</td></tr>`;
      } else {
        tickHtml+=`<tr><td>${mes}</td><td>${brl(t25)}</td><td style="color:#333">—</td><td style="color:#333">—</td></tr>`;
      }
    });
    tickHtml+=`</tbody><tfoot><tr><td>MÉDIO GERAL</td><td></td><td class="v26">${brl(ticket)}</td><td></td></tr></tfoot>`;
    document.getElementById('ticketTable').innerHTML = tickHtml;
  }

  atualizar();
</script>
</body>
</html>
